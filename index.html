<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Forms</title>
    <link rel="icon" type="image/png" href="image/icon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #04361D;
            --accent-color: #76BA9D;
            --bg-light: #FAF9F6;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden; 
        }

        /* Navbar Styling */
        .color-nav { 
            background-color: var(--accent-color) !important; 
            padding: 0.8rem 1rem;
        }

        .navbar-brand { font-weight: 800; color: var(--primary-color) !important; display: flex; align-items: center; gap: 10px; }
        .navbar-brand img { height: 40px; }

        /* Sidebar Styling */
        .offcanvas { background-color: var(--bg-light); width: 340px !important; border: none; }
        .offcanvas-header { background: var(--accent-color); color: var(--primary-color); }
        .offcanvas-body { padding: 0; }

        /* Accordion UI */
        .accordion-item { border: none; border-bottom: 1px solid #eee; background: transparent; }
        .accordion-button { 
            font-weight: 700; 
            color: var(--primary-color);
            background: var(--bg-light);
        }
        .accordion-button:not(.collapsed) { 
            background-color: #e8f3ee; 
            color: var(--primary-color);
            box-shadow: none;
        }

        /* Link Styling */
        .nav-link { 
            color: var(--primary-color); 
            font-weight: 600; 
            padding: 12px 30px !important; 
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s ease;
            display: block;
            text-decoration: none;
        }
        .nav-link:hover { background: #f1f1f1; padding-left: 40px !important; }
        .nav-link.active { background: var(--primary-color) !important; color: white !important; }

        /* Iframe Container */
        .iframe-container {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            margin-top: 20px;
        }

        iframe { 
            width: 100%; 
            height: calc(100vh - 160px); 
            border: none; 
            border-radius: 15px; 
        }

        .offcanvas-footer {
            padding: 20px;
            background-color: #f1f1f1;
            border-top: 1px solid #ddd;
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }
    </style>
</head>
<body>

    <nav class="navbar color-nav shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="image/ajtech.png" alt="Logo"> CAMPAIGN FORMS
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasNavbar">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title fw-bold">CAMPAIGN MENU</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        
        <div class="offcanvas-body" id="offcanvasBody">
            <div class="accordion accordion-flush" id="campaignAccordion">
                
                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#groupInsulation">INSULATION</button>
                    </h2>
                    <div id="groupInsulation" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <a class="nav-link" href="#" id="form1">LOFT INSU</a>
                            <a class="nav-link" href="#" id="form8">INSU LEON</a>
                            <a class="nav-link" href="#" id="form2">DOM LOFT INSU</a>
                            <a class="nav-link" href="#" id="form4">REMOVAL</a>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#groupWindows">WINDOWS N DOORS</button>
                    </h2>
                    <div id="groupWindows" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <a class="nav-link" href="#" id="form3">WINDOWS N DOORS EU</a>
                            <a class="nav-link" href="#" id="form6">WINDOWS N DOORS UME</a>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#groupLLS">LLS</button>
                    </h2>
                    <div id="groupLLS" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <a class="nav-link" href="#" id="form5">LATER LIFE SERVICES</a>
                        </div>
                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#groupSolar">SOLAR</button>
                    </h2>
                    <div id="groupSolar" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <a class="nav-link" href="#" id="form7">SOLAR</a>
                        </div>
                    </div>
                </div>

                     <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#groupMnetwork">MAINTENANCE NETWORK</button>
                    </h2>
                    <div id="groupMnetwork" class="accordion-collapse collapse">
                        <div class="accordion-body p-0">
                            <a class="nav-link" href="#" id="form9">SOLAR TYLER</a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
        <div class="offcanvas-footer">
            © 2026 <strong>Campaign Forms</strong><br>
            <small>Built by AJ TECH</small>
        </div>
    </div>

    <div class="container-fluid px-lg-5">
        <div class="iframe-container">
            <iframe id="formIframe" src="about:blank"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const forms = {
            form1: "https://docs.google.com/forms/d/e/1FAIpQLSf3cBDZozXBPBcF8fJHIbhUGwLsbjqxXahEArv9rQeBcR0-Gg/viewform",
            form2: "https://forms.gle/32mfeMSW1oruAPpq6",
            form3: "https://forms.gle/pGeX8ZDYekMjbnTj9",
            form4: "https://docs.google.com/forms/d/e/1FAIpQLScY8i4ycPKpvHZqzc7XO1Y-3agZr7WQ4p7aj_8HcyTB5Uv4Rg/viewform?pli=1&pli=1",
            form5: "https://docs.google.com/forms/d/e/1FAIpQLSdyRjgcoEz1WA6fgftczWzK1G3Y3R6UMt656IU4Djt4z1HazQ/viewform?usp=header",
            form6: "https://docs.google.com/forms/d/e/1FAIpQLSfWY4x3sWjd2gn14DuDvCe50cmvA2R-_Qi5aiMrVf11sFHnUA/viewform?usp=header",
            form7: "https://docs.google.com/forms/d/e/1FAIpQLSctaYbLLajsHiWzsokTe4cy01a5MYyy-ouN6SOLj51NkfYSWw/viewform?usp=header",
            form8: "https://forms.gle/iJBVZMeVTxsmQArM7",
            form9: "https://docs.google.com/forms/d/e/1FAIpQLSca-jEDTzo9EZDY05DPcbD2VJtIFVXq4_mUunpGS74IFKOh5Q/viewform"
        };

        const iframe = document.getElementById('formIframe');
        const offcanvasElement = document.getElementById('offcanvasNavbar');
        const accordionList = document.querySelectorAll('.accordion-collapse');

        function setActiveForm(formId) {
            if (forms[formId]) {
                iframe.src = forms[formId];
                document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
                const activeLink = document.getElementById(formId);
                if (activeLink) activeLink.classList.add('active');
                localStorage.setItem("activeForm", formId);
            }
        }

        // 1. Close other accordions when one is opened
        accordionList.forEach(accordion => {
            accordion.addEventListener('show.bs.collapse', function () {
                accordionList.forEach(other => {
                    if (other !== accordion) {
                        const instance = bootstrap.Collapse.getInstance(other);
                        if (instance) instance.hide();
                    }
                });
            });
        });

        // 2. Reset all accordions when Offcanvas is closed
        offcanvasElement.addEventListener('hidden.bs.offcanvas', function () {
            accordionList.forEach(accordion => {
                const instance = bootstrap.Collapse.getInstance(accordion);
                if (instance) instance.hide();
            });
        });

        // 3. Close accordions when clicking on empty offcanvas body
        document.getElementById('offcanvasBody').addEventListener('click', function (e) {
            if (e.target === this) {
                accordionList.forEach(accordion => {
                    const instance = bootstrap.Collapse.getInstance(accordion);
                    if (instance) instance.hide();
                });
            }
        });

        // Initialize Form from LocalStorage
        const savedForm = localStorage.getItem("activeForm") || "form1";
        setActiveForm(savedForm);

        // Click Handlers for links
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                setActiveForm(this.id);
                bootstrap.Offcanvas.getInstance(offcanvasElement).hide();
            });
        });
    </script>
</body>
</html>
